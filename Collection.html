<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍藏大師 - 專業資產管理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F8FAFC;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .active-nav {
            background-color: #4F46E5;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }
    </style>
</head>
<body class="text-slate-900">

    <div class="flex min-h-screen">
        <!-- 側邊導航欄 (Sidebar) -->
        <nav class="w-20 md:w-64 bg-white border-r border-slate-100 flex flex-col fixed h-full z-10 transition-all">
            <div class="p-6 flex items-center space-x-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shrink-0">
                    <i data-lucide="library"></i>
                </div>
                <h1 class="text-xl font-black tracking-tight hidden md:block">珍藏大師</h1>
            </div>
            
            <div class="flex-1 px-4 space-y-2 mt-8">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn active-nav w-full flex items-center p-3 rounded-xl transition-all duration-200 group">
                    <i data-lucide="layout-dashboard"></i>
                    <span class="ml-3 font-bold hidden md:block">控制面板</span>
                </button>
                <button onclick="switchTab('collection')" id="nav-collection" class="nav-btn text-slate-400 hover:bg-slate-50 hover:text-slate-600 w-full flex items-center p-3 rounded-xl transition-all duration-200 group">
                    <i data-lucide="package"></i>
                    <span class="ml-3 font-bold hidden md:block">我的收藏</span>
                </button>
                <button onclick="switchTab('wishlist')" id="nav-wishlist" class="nav-btn text-slate-400 hover:bg-slate-50 hover:text-slate-600 w-full flex items-center p-3 rounded-xl transition-all duration-200 group">
                    <i data-lucide="heart"></i>
                    <span class="ml-3 font-bold hidden md:block">願望清單</span>
                </button>
                <button onclick="switchTab('analysis')" id="nav-analysis" class="nav-btn text-slate-400 hover:bg-slate-50 hover:text-slate-600 w-full flex items-center p-3 rounded-xl transition-all duration-200 group">
                    <i data-lucide="bar-chart-3"></i>
                    <span class="ml-3 font-bold hidden md:block">價值分析</span>
                </button>
            </div>

            <div class="p-6 border-t border-slate-50 hidden md:block">
                <div class="bg-slate-50 p-4 rounded-xl">
                    <p class="text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Premium Account</p>
                    <p class="text-sm font-bold text-slate-700">收藏家等級：傳奇</p>
                </div>
            </div>
        </nav>

        <!-- 主要內容區 (Main Content) -->
        <main class="flex-1 ml-20 md:ml-64 p-4 md:p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="page-title" class="text-3xl font-black text-slate-800">控制面板總覽</h2>
                    <p class="text-slate-400 font-medium">歡迎回來，今天想管理什麼？</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-indigo-50 rounded-full border-4 border-white shadow-sm overflow-hidden flex items-center justify-center text-indigo-600 font-bold">
                        JD
                    </div>
                </div>
            </header>

            <!-- 控制面板分頁 -->
            <section id="dashboard" class="tab-content active space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
                        <div class="p-3 bg-blue-50 rounded-lg text-blue-600"><i data-lucide="dollar-sign"></i></div>
                        <div>
                            <p class="text-sm text-slate-500 font-medium">估計總價值</p>
                            <p id="stat-total-value" class="text-2xl font-bold text-slate-800">$0</p>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
                        <div class="p-3 bg-green-50 rounded-lg text-green-600"><i data-lucide="calendar"></i></div>
                        <div>
                            <p class="text-sm text-slate-500 font-medium">本月新增項</p>
                            <p id="stat-monthly-count" class="text-2xl font-bold text-slate-800">0 件</p>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
                        <div class="p-3 bg-amber-50 rounded-lg text-amber-600"><i data-lucide="star"></i></div>
                        <div>
                            <p class="text-sm text-slate-500 font-medium">平均評分</p>
                            <p id="stat-avg-rating" class="text-2xl font-bold text-slate-800">0 / 5.0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center">
                        <i data-lucide="plus" class="mr-2 text-indigo-600"></i> 建立新收藏
                    </h3>
                    <form id="add-item-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-700">收藏品名稱</label>
                            <input type="text" id="input-name" placeholder="例如：限量版手錶" class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-700">購入價值 (USD)</label>
                            <input type="number" id="input-price" placeholder="輸入金額" class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-700">圖片網址 (可選)</label>
                            <input type="url" id="input-image" placeholder="https://..." class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-700">類別</label>
                            <select id="input-category" class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none bg-white transition-all">
                                <option>精品</option>
                                <option>電子</option>
                                <option>書籍</option>
                                <option>藝術品</option>
                                <option>其他</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-slate-700">評分 (1-5)</label>
                            <input type="range" id="input-rating" min="1" max="5" value="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                            <div class="flex justify-between text-xs text-slate-400 px-1">
                                <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
                            </div>
                        </div>
                        <div class="md:col-span-2 pt-4">
                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-100 transition-all flex items-center justify-center">
                                <i data-lucide="plus" class="mr-2"></i> 確認新增至收藏
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- 我的收藏分頁 -->
            <section id="collection" class="tab-content">
                <div id="collection-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- 內容由 JS 動態生成 -->
                </div>
            </section>

            <!-- 願望清單分頁 -->
            <section id="wishlist" class="tab-content">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="px-6 py-4 text-sm font-bold text-slate-600">項目</th>
                                <th class="px-6 py-4 text-sm font-bold text-slate-600">估計價值</th>
                                <th class="px-6 py-4 text-sm font-bold text-slate-600">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="wishlist-body" class="divide-y divide-slate-50">
                            <tr class="hover:bg-slate-50 transition-colors">
                                <td class="px-6 py-4 font-medium text-slate-800">高階音響系統</td>
                                <td class="px-6 py-4 text-slate-600">$45,000</td>
                                <td class="px-6 py-4 text-indigo-600 text-sm font-bold">追蹤中</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 價值分析分頁 -->
            <section id="analysis" class="tab-content space-y-6">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold text-slate-800 mb-8 flex items-center">
                        <i data-lucide="bar-chart-3" class="mr-2 text-indigo-600"></i> 價值分析報告
                    </h3>
                    <div id="analysis-container" class="space-y-8">
                        <!-- 內容由 JS 動態生成 -->
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-8 rounded-2xl text-white shadow-lg">
                        <i data-lucide="trending-up" class="mb-4 opacity-80"></i>
                        <h4 class="text-lg font-bold mb-2">成長建議</h4>
                        <p class="opacity-90 text-sm leading-relaxed">
                            基於您目前的收藏組合，資產價值穩定。建議可以適度增加不同類別的資產以分散市場波動風險。
                        </p>
                    </div>
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                        <p class="text-sm text-slate-500 mb-1 font-medium">收藏健康度</p>
                        <div class="flex items-center space-x-2">
                            <span class="text-4xl font-black text-slate-800">優良</span>
                            <div class="flex space-x-1">
                                <div class="w-2 h-6 bg-green-500 rounded-full"></div>
                                <div class="w-2 h-6 bg-green-500 rounded-full"></div>
                                <div class="w-2 h-6 bg-green-500 rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <footer class="mt-20 pt-10 border-t border-slate-200 text-center text-slate-400 text-sm">
                &copy; 2024 Collection Master 珍藏大師平台 - 您的專業資產管理管家
            </footer>
        </main>
    </div>

    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();

        // 應用程式狀態 (State)
        let collections = [
            { id: 1, name: '限量版手錶', price: 15000, rating: 5, date: '2024-03-15', category: '精品', image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&q=80' },
            { id: 2, name: '復古相機', price: 8500, rating: 4, date: '2024-04-02', category: '電子', image: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500&q=80' }
        ];

        // 切換分頁邏輯
        function switchTab(tabId) {
            // 切換內容顯示
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            // 切換導航欄樣式
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active-nav', 'text-white', 'shadow-md'));
            document.getElementById(`nav-${tabId}`).classList.add('active-nav');

            // 更新標題
            const titles = {
                dashboard: '控制面板總覽',
                collection: '我的珍藏館',
                wishlist: '期待購入',
                analysis: '市場價值分析'
            };
            document.getElementById('page-title').innerText = titles[tabId];

            // 如果切換到收藏或分析，重新渲染
            if (tabId === 'collection') renderCollection();
            if (tabId === 'analysis') renderAnalysis();
        }

        // 新增收藏品
        document.getElementById('add-item-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newItem = {
                id: Date.now(),
                name: document.getElementById('input-name').value,
                price: Number(document.getElementById('input-price').value),
                rating: Number(document.getElementById('input-rating').value),
                image: document.getElementById('input-image').value,
                category: document.getElementById('input-category').value,
                date: new Date().toISOString().split('T')[0]
            };

            collections.push(newItem);
            this.reset();
            updateStats();
            
            // 提示訊息 (自定義彈窗代替 alert)
            const message = document.createElement('div');
            message.className = "fixed bottom-5 right-5 bg-green-600 text-white px-6 py-3 rounded-xl shadow-2xl z-50 animate-bounce";
            message.innerText = "🎉 成功新增至收藏！";
            document.body.appendChild(message);
            setTimeout(() => message.remove(), 3000);
        });

        // 刪除收藏品
        function deleteItem(id) {
            collections = collections.filter(item => item.id !== id);
            renderCollection();
            updateStats();
        }

        // 更新控制面板數據
        function updateStats() {
            const totalValue = collections.reduce((acc, curr) => acc + curr.price, 0);
            const avgRating = collections.length > 0 
                ? (collections.reduce((acc, curr) => acc + curr.rating, 0) / collections.length).toFixed(1)
                : 0;
            
            const currentMonth = new Date().getMonth();
            const monthlyItems = collections.filter(item => new Date(item.date).getMonth() === currentMonth).length;

            document.getElementById('stat-total-value').innerText = `$${totalValue.toLocaleString()}`;
            document.getElementById('stat-monthly-count').innerText = `${monthlyItems} 件`;
            document.getElementById('stat-avg-rating').innerText = `${avgRating} / 5.0`;
        }

        // 渲染我的收藏
        function renderCollection() {
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';

            if (collections.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400">尚未有任何收藏</div>`;
                return;
            }

            collections.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100 hover:shadow-xl transition-all group";
                card.innerHTML = `
                    <div class="h-48 bg-slate-100 relative overflow-hidden">
                        <img src="${item.image || 'https://via.placeholder.com/400x300?text=No+Image'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Error'">
                        <div class="absolute top-3 left-3">
                            <span class="px-3 py-1 bg-white/90 backdrop-blur shadow-sm text-indigo-600 rounded-lg text-xs font-bold uppercase">${item.category}</span>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="absolute top-3 right-3 p-2 bg-white/90 backdrop-blur shadow-sm rounded-lg text-slate-400 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="text-lg font-bold text-slate-800 truncate pr-2">${item.name}</h4>
                            <div class="flex text-amber-400 items-center">
                                <i data-lucide="star" class="w-3 h-3 fill-current"></i>
                                <span class="ml-1 text-xs font-bold">${item.rating}</span>
                            </div>
                        </div>
                        <p class="text-slate-400 text-xs mb-4">${item.date}</p>
                        <div class="flex justify-between items-center">
                            <p class="text-xl font-black text-slate-900">$${item.price.toLocaleString()}</p>
                            <i data-lucide="trending-up" class="text-indigo-600 w-4 h-4"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // 渲染價值分析
        function renderAnalysis() {
            const container = document.getElementById('analysis-container');
            container.innerHTML = '';
            
            const totalValue = collections.reduce((acc, curr) => acc + curr.price, 0);
            const categories = ['精品', '電子', '書籍', '藝術品', '其他'];

            categories.forEach(cat => {
                const catTotal = collections.filter(i => i.category === cat).reduce((acc, curr) => acc + curr.price, 0);
                if (catTotal === 0) return;

                const percentage = totalValue > 0 ? (catTotal / totalValue * 100).toFixed(1) : 0;
                
                const item = document.createElement('div');
                item.className = "space-y-2";
                item.innerHTML = `
                    <div class="flex justify-between items-center text-sm">
                        <span class="font-bold text-slate-700">${cat}</span>
                        <span class="text-slate-500 font-medium">$${catTotal.toLocaleString()} (${percentage}%)</span>
                    </div>
                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                        <div class="bg-indigo-500 h-full rounded-full" style="width: ${percentage}%"></div>
                    </div>
                `;
                container.appendChild(item);
            });

            if (container.innerHTML === '') {
                container.innerHTML = '<p class="text-center text-slate-400">目前尚無收藏數據可供分析</p>';
            }
        }

        // 初始執行
        updateStats();
    </script>
</body>
</html>
